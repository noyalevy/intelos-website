<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 50" fill="none">
  <defs>
    <!-- Horizontal hatch lines pattern -->
    <pattern id="h" patternUnits="userSpaceOnUse" width="230" height="7.5">
      <line x1="0" y1="3.75" x2="230" y2="3.75" stroke="#4A5A6E" stroke-width="1.1"/>
    </pattern>
    <!-- Letter mask -->
    <mask id="lm" maskUnits="userSpaceOnUse" x="0" y="0" width="230" height="50">
      <!-- I -->
      <rect x="0"  y="4"  width="16" height="4"  fill="white"/>
      <rect x="5"  y="4"  width="6"  height="42" fill="white"/>
      <rect x="0"  y="42" width="16" height="4"  fill="white"/>
      <!-- N -->
      <rect x="22" y="4"  width="6"  height="42" fill="white"/>
      <polygon points="22,7 28,4 52,43 46,46" fill="white"/>
      <rect x="47" y="4"  width="6"  height="42" fill="white"/>
      <!-- T -->
      <rect x="58" y="4"  width="30" height="4"  fill="white"/>
      <rect x="70" y="4"  width="6"  height="42" fill="white"/>
      <!-- E -->
      <rect x="93" y="4"  width="6"  height="42" fill="white"/>
      <rect x="93" y="4"  width="26" height="4"  fill="white"/>
      <rect x="93" y="22" width="20" height="4"  fill="white"/>
      <rect x="93" y="42" width="26" height="4"  fill="white"/>
      <!-- L -->
      <rect x="124" y="4"  width="6"  height="42" fill="white"/>
      <rect x="124" y="42" width="22" height="4"  fill="white"/>
      <!-- O: outer ellipse filled white, inner ellipse filled black (creates ring) -->
      <ellipse cx="164" cy="25" rx="13" ry="21" fill="white"/>
      <ellipse cx="164" cy="25" rx="6"  ry="10" fill="black"/>
      <!-- S (drawn as a thick stroked path) -->
      <path d="M 207,9 C 203,4 187,3 183,12 C 180,19 193,24 193,25 C 193,26 207,30 206,39 C 204,46 191,49 184,46"
            fill="none" stroke="white" stroke-width="7" stroke-linecap="square" stroke-linejoin="round"/>
    </mask>
  </defs>

  <!-- Dark fill for letter interiors -->
  <rect width="230" height="50" fill="#111520" mask="url(#lm)"/>
  <!-- Hatch lines overlay clipped to letters -->
  <rect width="230" height="50" fill="url(#h)" mask="url(#lm)" opacity="0.85"/>

  <!-- ── I ── -->
  <line x1="0"  y1="6"  x2="16" y2="6"  stroke="#BCC5D2" stroke-width="4" stroke-linecap="square"/>
  <line x1="8"  y1="4"  x2="8"  y2="46" stroke="#BCC5D2" stroke-width="6" stroke-linecap="square"/>
  <line x1="0"  y1="44" x2="16" y2="44" stroke="#BCC5D2" stroke-width="4" stroke-linecap="square"/>

  <!-- ── N ── -->
  <line x1="25" y1="4"  x2="25" y2="46" stroke="#BCC5D2" stroke-width="6" stroke-linecap="square"/>
  <line x1="25" y1="4"  x2="49" y2="46" stroke="#BCC5D2" stroke-width="6" stroke-linecap="square"/>
  <line x1="49" y1="4"  x2="49" y2="46" stroke="#BCC5D2" stroke-width="6" stroke-linecap="square"/>

  <!-- ── T ── -->
  <line x1="58" y1="6"  x2="88" y2="6"  stroke="#BCC5D2" stroke-width="4" stroke-linecap="square"/>
  <line x1="73" y1="4"  x2="73" y2="46" stroke="#BCC5D2" stroke-width="6" stroke-linecap="square"/>

  <!-- ── E ── -->
  <line x1="96" y1="4"  x2="96"  y2="46" stroke="#BCC5D2" stroke-width="6" stroke-linecap="square"/>
  <line x1="93" y1="6"  x2="119" y2="6"  stroke="#BCC5D2" stroke-width="4" stroke-linecap="square"/>
  <line x1="93" y1="24" x2="113" y2="24" stroke="#BCC5D2" stroke-width="4" stroke-linecap="square"/>
  <line x1="93" y1="44" x2="119" y2="44" stroke="#BCC5D2" stroke-width="4" stroke-linecap="square"/>

  <!-- ── L ── -->
  <line x1="127" y1="4"  x2="127" y2="46" stroke="#BCC5D2" stroke-width="6" stroke-linecap="square"/>
  <line x1="124" y1="44" x2="146" y2="44" stroke="#BCC5D2" stroke-width="4" stroke-linecap="square"/>

  <!-- ── O ── -->
  <ellipse cx="164" cy="25" rx="13" ry="21" stroke="#BCC5D2" stroke-width="4.5"/>
  <circle  cx="164" cy="25" r="6"          stroke="#BCC5D2" stroke-width="2.5"/>

  <!-- ── S ── -->
  <path d="M 207,9 C 203,4 187,3 183,12 C 180,19 193,24 193,25 C 193,26 207,30 206,39 C 204,46 191,49 184,46"
        fill="none" stroke="#BCC5D2" stroke-width="5.5" stroke-linecap="square" stroke-linejoin="round"/>

  <!-- Period -->
  <rect x="213" y="42" width="5" height="5" fill="#BCC5D2"/>

  <!-- Red square -->
  <rect x="220" y="40" width="8" height="8" fill="#F01515"/>
</svg>
